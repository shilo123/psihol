<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסיכולוגית בכיס</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Manrope:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#7a5afc",
              "primary-hover": "#6344e3",
              "primary-dark": "#5f41d9",
              "primary-light": "#ebe7fe",
              "background-light": "#f8f7ff",
              "background-dark": "#130f23",
              "text-main": "#100c1c",
              "text-sub": "#5846a0",
              "text-muted": "#6b6684",
              "border-color": "#e9e6f4",
              "surface-light": "#ffffff",
              "surface-dark": "#1e1a32",
              "chat-bg": "#f4f2f9",
            },
            fontFamily: {
              "display": ["Heebo", "Manrope", "sans-serif"],
              "sans": ["Heebo", "Manrope", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "3xl": "2.5rem", "full": "9999px"
            },
            boxShadow: {
              "soft": "0 4px 20px -2px rgba(122, 90, 252, 0.08)",
            }
          },
        },
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { direction: rtl; }
      body {
        font-family: 'Heebo', 'Manrope', sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d3cde9; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #7a5afc; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      .radio-checked-bg:checked + div {
        background-color: #7a5afc !important;
        color: white !important;
        border-color: #7a5afc !important;
      }
      .challenge-checkbox:checked + div {
        border-color: #7a5afc !important;
        background-color: #f4f1ff !important;
      }
      .challenge-checkbox:checked + div .icon-container {
        background-color: #7a5afc !important;
        color: white !important;
      }
      .challenge-checkbox:checked + div .check-icon {
        opacity: 1 !important;
        transform: scale(1) !important;
      }

      @keyframes typingBounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
        40% { transform: translateY(-8px); opacity: 1; }
      }
      .typing-dot { animation: typingBounce 1.4s infinite ease-in-out; }
      .typing-dot:nth-child(2) { animation-delay: 0.15s; }
      .typing-dot:nth-child(3) { animation-delay: 0.3s; }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Ensure all inputs and textareas are RTL */
      input, textarea, select { direction: rtl; text-align: right; }
      /* Remove ugly focus outlines/highlights */
      input:focus, textarea:focus, select:focus,
      input:focus-visible, textarea:focus-visible, select:focus-visible,
      [type='text']:focus, [type='email']:focus, [type='url']:focus,
      [type='password']:focus, [type='number']:focus, [type='date']:focus,
      [type='search']:focus, textarea:focus, select:focus {
        outline: none !important;
        box-shadow: none !important;
        ring: none !important;
        --tw-ring-shadow: none !important;
        --tw-ring-color: transparent !important;
        border-color: inherit;
      }
      textarea { border: none !important; background: transparent !important; }
      *:focus { outline: none !important; }
      *:focus-visible { outline: none !important; box-shadow: none !important; }
      input, textarea, select { -webkit-appearance: none; }

      /* Dark mode overrides */
      .dark body { background-color: #130f23; color: #e0dce8; }
      .dark ::-webkit-scrollbar-thumb { background: #3d3555; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #7a5afc; }

      /* Streaming text cursor animation */
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .streaming-cursor::after {
        content: '▊';
        display: inline;
        animation: blink 0.7s step-end infinite;
        color: #7a5afc;
        font-size: 0.85em;
        margin-inline-start: 1px;
      }
    </style>
  </head>
  <body>
    <script>
      // Apply dark mode from localStorage before render to prevent flash
      if (localStorage.getItem('darkMode') === 'true') {
        document.documentElement.classList.add('dark');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
